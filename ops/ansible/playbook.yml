---
# =============================================================================
# Prism Validator Server Configuration — Ansible Playbook
#
# Configures a freshly provisioned server as a production Prism validator.
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml \
#     -e cluster=mainnet \
#     -e prism_version=1.0.0 \
#     -e validator_name=validator-01
# =============================================================================

- name: Configure Prism Validator
  hosts: validators
  become: true
  gather_facts: true

  vars:
    # Overridable variables
    cluster: "mainnet"
    prism_version: "1.0.0"
    validator_name: "validator-01"
    prism_user: "prism"
    prism_home: "/home/{{ prism_user }}"
    prism_src: "{{ prism_home }}/prism-src"
    prism_bin_dir: "{{ prism_home }}/bin"
    ledger_dir: "/var/prism/ledger"
    accounts_dir: "/var/prism/accounts"
    snapshots_dir: "/var/prism/snapshots"
    log_dir: "/var/log/prism"
    keys_dir: "{{ prism_home }}/keys"
    data_device: "/dev/nvme1n1"
    data_mount: "/var/prism"
    entrypoint: ""
    expected_genesis_hash: ""
    rpc_port: 8899
    gossip_port: 8001
    metrics_port: 9125
    enable_rpc: false
    node_exporter_version: "1.7.0"

  handlers:
    - name: Restart prism-validator
      ansible.builtin.systemd:
        name: prism-validator
        state: restarted
        daemon_reload: true

    - name: Reload sysctl
      ansible.builtin.command: sysctl --system

    - name: Restart node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: restarted
        daemon_reload: true

    - name: Restart rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: restarted

    - name: Reload ufw
      ansible.builtin.command: ufw reload

  tasks:
    # =========================================================================
    # Phase 1: System Preparation
    # =========================================================================

    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
      tags: [system, packages]

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - build-essential
          - pkg-config
          - libssl-dev
          - libudev-dev
          - clang
          - cmake
          - protobuf-compiler
          - libprotobuf-dev
          - curl
          - git
          - jq
          - net-tools
          - htop
          - iotop
          - nvme-cli
          - smartmontools
          - ufw
          - logrotate
          - python3-pip
          - unzip
        state: present
      tags: [system, packages]

    # =========================================================================
    # Phase 2: User and Directory Setup
    # =========================================================================

    - name: Create prism system user
      ansible.builtin.user:
        name: "{{ prism_user }}"
        shell: /bin/bash
        system: false
        create_home: true
        home: "{{ prism_home }}"
      tags: [system, user]

    - name: Format data volume (if not already formatted)
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_device }}"
        opts: "-L prism-data"
      when: data_device != ""
      ignore_errors: true
      tags: [system, storage]

    - name: Mount data volume
      ansible.posix.mount:
        path: "{{ data_mount }}"
        src: "{{ data_device }}"
        fstype: ext4
        opts: "defaults,noatime,nodiratime"
        state: mounted
      when: data_device != ""
      tags: [system, storage]

    - name: Create validator directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prism_user }}"
        group: "{{ prism_user }}"
        mode: "0750"
      loop:
        - "{{ ledger_dir }}"
        - "{{ accounts_dir }}"
        - "{{ snapshots_dir }}"
        - "{{ log_dir }}"
        - "{{ keys_dir }}"
        - "{{ prism_bin_dir }}"
      tags: [system, directories]

    # =========================================================================
    # Phase 3: Install Rust and Build Validator
    # =========================================================================

    - name: Install Rust toolchain
      ansible.builtin.shell: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
          sh -s -- -y --default-toolchain stable
      args:
        creates: "{{ prism_home }}/.cargo/bin/rustc"
      become: true
      become_user: "{{ prism_user }}"
      tags: [rust, build]

    - name: Clone Prism source
      ansible.builtin.git:
        repo: "https://github.com/prism/prism.git"
        dest: "{{ prism_src }}"
        version: "v{{ prism_version }}"
        force: true
      become: true
      become_user: "{{ prism_user }}"
      tags: [build]

    - name: Build Prism validator (release mode)
      ansible.builtin.shell: |
        source {{ prism_home }}/.cargo/env
        cargo build --release
      args:
        chdir: "{{ prism_src }}"
        creates: "{{ prism_src }}/target/release/prism-validator"
      become: true
      become_user: "{{ prism_user }}"
      environment:
        CARGO_BUILD_JOBS: "{{ ansible_processor_vcpus }}"
      tags: [build]

    - name: Install validator binaries
      ansible.builtin.copy:
        src: "{{ prism_src }}/target/release/{{ item }}"
        dest: "{{ prism_bin_dir }}/{{ item }}"
        remote_src: true
        owner: "{{ prism_user }}"
        group: "{{ prism_user }}"
        mode: "0755"
      loop:
        - prism
        - prism-validator
        - prism-keygen
        - prism-genesis
      tags: [build, install]

    # =========================================================================
    # Phase 4: Kernel and System Tuning
    # =========================================================================

    - name: Configure sysctl for Prism validator
      ansible.builtin.copy:
        dest: /etc/sysctl.d/21-prism-validator.conf
        content: |
          # Prism Validator Kernel Parameters
          net.core.rmem_default = 134217728
          net.core.rmem_max = 134217728
          net.core.wmem_default = 134217728
          net.core.wmem_max = 134217728
          fs.nr_open = 1000000
          vm.max_map_count = 1000000
          vm.swappiness = 1
        owner: root
        group: root
        mode: "0644"
      notify: Reload sysctl
      tags: [system, tuning]

    - name: Configure file descriptor limits
      ansible.builtin.copy:
        dest: /etc/security/limits.d/90-prism.conf
        content: |
          {{ prism_user }}  soft  nofile  1000000
          {{ prism_user }}  hard  nofile  1000000
        owner: root
        group: root
        mode: "0644"
      tags: [system, tuning]

    - name: Set CPU governor to performance
      ansible.builtin.shell: |
        for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          echo performance > "$cpu" 2>/dev/null || true
        done
      changed_when: false
      ignore_errors: true
      tags: [system, tuning]

    # =========================================================================
    # Phase 5: Configure systemd Service
    # =========================================================================

    - name: Create validator startup script
      ansible.builtin.template:
        dest: "{{ prism_home }}/start-validator.sh"
        src: /dev/stdin
        owner: "{{ prism_user }}"
        group: "{{ prism_user }}"
        mode: "0755"
      vars:
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          IDENTITY="{{ keys_dir }}/identity.json"
          VOTE_ACCOUNT="{{ keys_dir }}/vote-account.json"

          exec {{ prism_bin_dir }}/prism-validator \
            --identity "$IDENTITY" \
            --vote-account "$VOTE_ACCOUNT" \
            --ledger {{ ledger_dir }} \
            --accounts {{ accounts_dir }} \
            --snapshots {{ snapshots_dir }} \
            --gossip-port {{ gossip_port }} \
            --dynamic-port-range 8000-8020 \
            --rpc-port {{ rpc_port }} \
            --limit-ledger-size \
            --no-poh-speed-test \
            {% if entrypoint != "" %}--entrypoint {{ entrypoint }} \{% endif %}
            {% if expected_genesis_hash != "" %}--expected-genesis-hash {{ expected_genesis_hash }} \{% endif %}
            {% if enable_rpc %}--full-rpc-api --enable-rpc-transaction-history \{% endif %}
            --log {{ log_dir }}/validator.log
      # Inline template workaround
      tags: [service]

    - name: Create prism-validator systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/prism-validator.service
        content: |
          [Unit]
          Description=Prism Validator ({{ cluster }})
          After=network-online.target
          Wants=network-online.target
          StartLimitIntervalSec=300
          StartLimitBurst=5

          [Service]
          Type=simple
          User={{ prism_user }}
          Group={{ prism_user }}
          WorkingDirectory={{ prism_home }}
          ExecStart={{ prism_home }}/start-validator.sh
          ExecStop={{ prism_bin_dir }}/prism-validator exit --force
          Restart=on-failure
          RestartSec=10
          TimeoutStartSec=0
          TimeoutStopSec=120
          KillMode=process
          KillSignal=SIGINT

          # Resource limits
          LimitNOFILE=1000000
          LimitNPROC=65535
          LimitSTACK=infinity

          # Logging
          StandardOutput=append:{{ log_dir }}/validator-stdout.log
          StandardError=append:{{ log_dir }}/validator-stderr.log

          # Security hardening
          ProtectSystem=full
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"
      notify: Restart prism-validator
      tags: [service]

    - name: Enable prism-validator service
      ansible.builtin.systemd:
        name: prism-validator
        enabled: true
        daemon_reload: true
      tags: [service]

    # =========================================================================
    # Phase 6: Configure Firewall
    # =========================================================================

    - name: Reset UFW to defaults
      community.general.ufw:
        state: reset
      tags: [firewall]

    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        policy: deny
      tags: [firewall]

    - name: Set UFW default allow outgoing
      community.general.ufw:
        direction: outgoing
        policy: allow
      tags: [firewall]

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp
        comment: "SSH"
      tags: [firewall]

    - name: Allow Prism gossip/repair TCP
      community.general.ufw:
        rule: allow
        port: "8000:8020"
        proto: tcp
        comment: "Prism Gossip/Repair TCP"
      tags: [firewall]

    - name: Allow Prism gossip/turbine/repair UDP
      community.general.ufw:
        rule: allow
        port: "8000:8020"
        proto: udp
        comment: "Prism Gossip/Turbine/Repair UDP"
      tags: [firewall]

    - name: Allow RPC port (if enabled)
      community.general.ufw:
        rule: allow
        port: "{{ rpc_port }}"
        proto: tcp
        comment: "Prism JSON-RPC"
      when: enable_rpc
      tags: [firewall]

    - name: Allow metrics port (if enabled)
      community.general.ufw:
        rule: allow
        port: "{{ metrics_port }}"
        proto: tcp
        src: "10.0.0.0/8"
        comment: "Prometheus metrics"
      when: enable_metrics | default(true)
      tags: [firewall]

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      tags: [firewall]

    # =========================================================================
    # Phase 7: Log Rotation
    # =========================================================================

    - name: Configure log rotation for validator logs
      ansible.builtin.copy:
        dest: /etc/logrotate.d/prism-validator
        content: |
          {{ log_dir }}/validator.log
          {{ log_dir }}/validator-stdout.log
          {{ log_dir }}/validator-stderr.log
          {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              copytruncate
              size 1G
              maxsize 2G
              dateext
              dateformat -%Y%m%d
              su {{ prism_user }} {{ prism_user }}
          }
        owner: root
        group: root
        mode: "0644"
      tags: [logging]

    # =========================================================================
    # Phase 8: Monitoring Setup
    # =========================================================================

    - name: Download node_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"
        mode: "0644"
      tags: [monitoring]

    - name: Extract node_exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/usr/local/bin/"
        remote_src: true
        extra_opts:
          - --strip-components=1
          - --wildcards
          - "*/node_exporter"
      tags: [monitoring]

    - name: Create node_exporter systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=nobody
          Group=nogroup
          ExecStart=/usr/local/bin/node_exporter \
            --collector.systemd \
            --collector.processes \
            --collector.filesystem.mount-points-exclude="^/(sys|proc|dev|host|etc)($$|/)" \
            --web.listen-address=:9100
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"
      notify: Restart node_exporter
      tags: [monitoring]

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true
      tags: [monitoring]

    - name: Create validator health check script
      ansible.builtin.copy:
        dest: "{{ prism_home }}/health-check.sh"
        content: |
          #!/usr/bin/env bash
          # Prism Validator Health Check
          # Run via cron or monitoring system

          set -euo pipefail

          PRISM="{{ prism_bin_dir }}/prism"
          RPC_URL="http://127.0.0.1:{{ rpc_port }}"
          IDENTITY_PUBKEY=$("{{ prism_bin_dir }}/prism-keygen" pubkey "{{ keys_dir }}/identity.json")

          echo "=== Prism Validator Health Check ==="
          echo "Time: $(date -u)"
          echo ""

          # Check if validator process is running
          if systemctl is-active --quiet prism-validator; then
              echo "[OK] Validator service is running"
          else
              echo "[CRITICAL] Validator service is not running"
              exit 2
          fi

          # Check RPC responsiveness
          if $PRISM --url "$RPC_URL" cluster-version &>/dev/null; then
              echo "[OK] RPC is responsive"
          else
              echo "[WARNING] RPC is not responding"
              exit 1
          fi

          # Check catchup status
          CATCHUP=$($PRISM --url "$RPC_URL" catchup "$IDENTITY_PUBKEY" 2>&1 || true)
          if echo "$CATCHUP" | grep -q "has caught up"; then
              echo "[OK] Validator has caught up"
          else
              echo "[WARNING] Validator is behind: $CATCHUP"
          fi

          # Check vote account
          VOTE_STATUS=$($PRISM --url "$RPC_URL" vote-account "{{ keys_dir }}/vote-account.json" 2>&1 || true)
          if echo "$VOTE_STATUS" | grep -q "Recent Votes"; then
              echo "[OK] Validator is voting"
          else
              echo "[WARNING] No recent votes detected"
          fi

          # Check disk space
          DISK_PCT=$(df "{{ ledger_dir }}" | tail -1 | awk '{print $5}' | tr -d '%')
          if [ "$DISK_PCT" -lt 80 ]; then
              echo "[OK] Disk usage: ${DISK_PCT}%"
          elif [ "$DISK_PCT" -lt 90 ]; then
              echo "[WARNING] Disk usage: ${DISK_PCT}%"
          else
              echo "[CRITICAL] Disk usage: ${DISK_PCT}%"
              exit 2
          fi

          echo ""
          echo "Health check passed."
        owner: "{{ prism_user }}"
        group: "{{ prism_user }}"
        mode: "0755"
      tags: [monitoring]

    - name: Configure health check cron job
      ansible.builtin.cron:
        name: "Prism validator health check"
        minute: "*/5"
        job: "{{ prism_home }}/health-check.sh >> {{ log_dir }}/health-check.log 2>&1"
        user: "{{ prism_user }}"
      tags: [monitoring]

    # =========================================================================
    # Final
    # =========================================================================

    - name: Print setup summary
      ansible.builtin.debug:
        msg: |
          ============================================
          Prism Validator Configuration Complete
          ============================================

          Cluster:    {{ cluster }}
          Validator:  {{ validator_name }}
          User:       {{ prism_user }}

          Directories:
            Binaries:   {{ prism_bin_dir }}
            Ledger:     {{ ledger_dir }}
            Accounts:   {{ accounts_dir }}
            Snapshots:  {{ snapshots_dir }}
            Logs:       {{ log_dir }}
            Keys:       {{ keys_dir }}

          Services:
            prism-validator  (systemctl status prism-validator)
            node_exporter       (systemctl status node_exporter)

          Next Steps:
            1. Copy identity and vote keypairs to {{ keys_dir }}/
            2. Download genesis.bin to {{ ledger_dir }}/
            3. Start the validator: systemctl start prism-validator
            4. Monitor: journalctl -u prism-validator -f
      tags: [always]
