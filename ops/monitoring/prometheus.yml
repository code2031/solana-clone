# =============================================================================
# Prism Validator — Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    cluster: "prism-mainnet"
    environment: "production"

# ---------------------------------------------------------------------------
# Alerting
# ---------------------------------------------------------------------------
rule_files:
  - "alerts.yml"

# Uncomment to forward alerts to Alertmanager
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - "alertmanager:9093"

# ---------------------------------------------------------------------------
# Scrape targets
# ---------------------------------------------------------------------------
scrape_configs:

  # --- Prometheus self-monitoring ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # --- Prism Validator RPC metrics ---
  - job_name: "prism-validator"
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 8s
    static_configs:
      - targets: ["host.docker.internal:8899"]
        labels:
          instance: "validator-primary"
          role: "validator"
    # If running outside Docker, replace host.docker.internal with 127.0.0.1

  # --- Node Exporter (host system metrics) ---
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "validator-host"
